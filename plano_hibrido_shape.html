<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano Híbrido Shape</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; padding: 1rem; }

.app { max-width: 680px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

.header { padding-bottom: 1rem; border-bottom: 1px solid #e8e8e4; margin-bottom: 1.25rem; }
.header h1 { font-size: 20px; font-weight: 600; color: #1a1a18; }
.header p { font-size: 13px; color: #888780; margin-top: 3px; }

.day-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 1.25rem; scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 8px; border: 1px solid #d3d1c7; background: transparent; cursor: pointer; font-size: 13px; font-weight: 400; color: #5f5e5a; transition: all 0.15s; }
.day-btn:hover { background: #f1efe8; }
.day-btn.active { background: #fff; border-color: #888780; color: #1a1a18; font-weight: 600; }
.day-btn.duplo { border-color: #e24b4a; color: #a32d2d; }
.day-btn.duplo.active { background: #fcebeb; border-color: #a32d2d; }

.section-tabs { display: flex; gap: 0; margin-bottom: 1.25rem; border: 1px solid #e8e8e4; border-radius: 8px; overflow: hidden; }
.sec-btn { flex: 1; padding: 9px 0; border: none; background: transparent; cursor: pointer; font-size: 13px; color: #888780; transition: all 0.15s; border-right: 1px solid #e8e8e4; }
.sec-btn:last-child { border-right: none; }
.sec-btn.active { background: #f1efe8; color: #1a1a18; font-weight: 600; }

.metrics-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; margin-bottom: 1.25rem; }
.metric-card { background: #f1efe8; border-radius: 8px; padding: 10px 12px; }
.metric-label { font-size: 11px; color: #888780; margin-bottom: 3px; }
.metric-val { font-size: 18px; font-weight: 600; color: #1a1a18; }
.metric-unit { font-size: 11px; color: #888780; font-weight: 400; }

.macro-bar { margin-bottom: 10px; }
.macro-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: #888780; margin-bottom: 4px; }
.macro-bar-track { height: 6px; background: #f1efe8; border-radius: 3px; overflow: hidden; }
.macro-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.fill-prot { background: #1d9e75; }
.fill-carb { background: #378add; }
.fill-fat { background: #ef9f27; }

.card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.card-title { font-size: 14px; font-weight: 600; color: #1a1a18; }
.card-sub { font-size: 12px; color: #888780; }

.tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; margin-right: 4px; margin-bottom: 2px; font-weight: 500; }
.tag-green { background: #eaf3de; color: #3b6d11; }
.tag-blue { background: #e6f1fb; color: #185fa5; }
.tag-amber { background: #faeeda; color: #854f0b; }
.tag-red { background: #fcebeb; color: #a32d2d; }
.tag-gray { background: #f1efe8; color: #5f5e5a; }

.exercise-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #f1efe8; }
.exercise-row:last-child { border-bottom: none; padding-bottom: 0; }
.exercise-name { font-size: 13px; color: #1a1a18; }
.exercise-vol { font-size: 12px; color: #5f5e5a; font-weight: 600; background: #f1efe8; padding: 2px 8px; border-radius: 6px; }

.meal-time { font-size: 11px; font-weight: 600; color: #888780; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.meal-time-dot { width: 6px; height: 6px; border-radius: 50%; background: #1d9e75; flex-shrink: 0; }
.meal-item { font-size: 13px; color: #1a1a18; padding: 4px 0; border-bottom: 1px solid #f1efe8; }
.meal-item:last-of-type { border-bottom: none; }

.alert { border-radius: 8px; padding: 10px 12px; font-size: 12px; margin-bottom: 10px; display: flex; gap: 8px; align-items: flex-start; line-height: 1.5; }
.alert-amber { background: #faeeda; color: #854f0b; }
.alert-red { background: #fcebeb; color: #a32d2d; }
.alert-green { background: #eaf3de; color: #3b6d11; }
.alert-blue { background: #e6f1fb; color: #185fa5; }

.tip { font-size: 12px; color: #888780; font-style: italic; border-left: 2px solid #d3d1c7; padding-left: 8px; margin-top: 8px; line-height: 1.6; }
.sub-section-title { font-size: 11px; font-weight: 600; color: #888780; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.macro-footer { display: flex; gap: 12px; font-size: 11px; color: #888780; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f1efe8; }
.hidden { display: none; }

@media (max-width: 480px) {
  .metrics-row { grid-template-columns: repeat(2, 1fr); }
  .app { padding: 1rem; }
}
</style>
</head>
<body>

<div class="app">

let currentDay = 0, currentSec = 'treino';

function renderTreino(d) {
  const day = days[d];
  let html = '';
  if (day.alerta) html += `<div class="alert ${day.alerta.type}">${day.alerta.text}</div>`;
  html += `<div class="metrics-row">
    <div class="metric-card"><div class="metric-label">Carb total</div><div class="metric-val">${day.carbTotal}<span class="metric-unit">g</span></div></div>
    <div class="metric-card"><div class="metric-label">Calorias</div><div class="metric-val">${day.kcal}<span class="metric-unit"> kcal</span></div></div>
    <div class="metric-card"><div class="metric-label">Proteína</div><div class="metric-val">≥160<span class="metric-unit">g</span></div></div>
    <div class="metric-card"><div class="metric-label">Hidratação</div><div class="metric-val">${d === 0 ? '5–6' : '4–5'}<span class="metric-unit">L</span></div></div>
  </div>`;
  html += `<div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:#eaf3de;font-size:18px">🏋️</div>
      <div><div class="card-title">${day.tipo}</div><div class="card-sub"><span class="tag ${day.tagColor}">${day.tag}</span></div></div>
    </div>`;
  day.exercicios.forEach(e => {
    html += `<div class="exercise-row"><span class="exercise-name">${e.nome}</span><span class="exercise-vol">${e.vol}</span></div>`;
  });
  html += `</div>`;
  html += `<div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:#e6f1fb;font-size:18px">🚴</div>
      <div><div class="card-title">Cardio pós-musculação</div></div>
    </div>
    <div style="font-size:13px;color:#1a1a18">${day.cardio}</div>
    ${day.noite ? `<div style="margin-top:8px;font-size:13px;color:#1a1a18">⚽ ${day.noite}</div>` : ''}
  </div>`;
  html += `<div class="tip">${day.dica}</div>`;
  document.getElementById('day-info').innerHTML = html;
}

function renderDieta(d) {
  const day = days[d];
  const totalProt = dietaBase.reduce((s,r)=>s+r.prot,0);
  const totalCarb = day.carbTotal;
  const totalFat = dietaBase.reduce((s,r)=>s+r.fat,0);
  let html = `<div class="metrics-row">
    <div class="metric-card"><div class="metric-label">Calorias</div><div class="metric-val">${day.kcal}<span class="metric-unit"> kcal</span></div></div>
    <div class="metric-card"><div class="metric-label">Proteína</div><div class="metric-val">${totalProt}<span class="metric-unit">g</span></div></div>
    <div class="metric-card"><div class="metric-label">Carb</div><div class="metric-val">${totalCarb}<span class="metric-unit">g</span></div></div>
    <div class="metric-card"><div class="metric-label">Gordura</div><div class="metric-val">${totalFat}<span class="metric-unit">g</span></div></div>
  </div>
  <div class="macro-bar">
    <div class="macro-bar-label"><span>Proteína</span><span>${totalProt}g</span></div>
    <div class="macro-bar-track"><div class="macro-bar-fill fill-prot" style="width:${Math.round(totalProt/totalCarb*100)}%"></div></div>
  </div>
  <div class="macro-bar">
    <div class="macro-bar-label"><span>Carboidrato</span><span>${totalCarb}g</span></div>
    <div class="macro-bar-track"><div class="macro-bar-fill fill-carb" style="width:100%"></div></div>
  </div>
  <div class="macro-bar">
    <div class="macro-bar-label"><span>Gordura</span><span>${totalFat}g</span></div>
    <div class="macro-bar-track"><div class="macro-bar-fill fill-fat" style="width:${Math.round(totalFat/totalCarb*100)}%"></div></div>
  </div>`;
  if (d === 0) html += `<div class="alert alert-amber" style="margin-top:10px">⚽ Jantar antecipado (18–19h) com +60–80g de carb. Pós-futebol: whey + banana em 30–60 min.</div>`;
  if (d === 6) html += `<div class="alert alert-blue" style="margin-top:10px">😴 Domingo: reduza o arroz do almoço para 100g e evite o mel no pré-treino. Mantenha a proteína.</div>`;
  dietaBase.forEach(ref => {
    html += `<div class="card">
      <div class="meal-time"><div class="meal-time-dot"></div>${ref.hora} — ${ref.nome}</div>`;
    ref.items.forEach(item => { html += `<div class="meal-item">${item}</div>`; });
    html += `<div class="macro-footer">
      <span>Prot: ${ref.prot}g</span><span>Carb: ${ref.carb}g</span><span>Gord: ${ref.fat}g</span>
      <span style="margin-left:auto;font-weight:600;color:#1a1a18">${ref.kcal} kcal</span>
    </div></div>`;
  });
  document.getElementById('diet-info').innerHTML = html;
}

function renderSubs() {
  const tagColors = ['tag-blue','tag-green','tag-amber'];
  let html = `<div class="alert alert-green">✅ Pode misturar opções livremente — café A com almoço C, por exemplo. Macros são equivalentes. Nenhuma opção contém peixe.</div>`;
  subsData.forEach(ref => {
    html += `<div class="card">
      <div class="sub-section-title">Refeição ${ref.ref}</div>
      <div style="font-size:12px;color:#888780;margin-bottom:10px">Original: ${ref.original}</div>`;
    ref.opcoes.forEach((op, i) => {
      html += `<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #f1efe8">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span class="tag ${tagColors[i]}">${op.label}</span>
          <span style="font-size:13px;font-weight:600;color:#1a1a18">${op.nome}</span>
        </div>
        <div style="font-size:12px;color:#5f5e5a;line-height:1.7">${op.items.join(' · ')}</div>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('subs-info').innerHTML = html;
}

document.getElementById('dayTabs').addEventListener('click', e => {
  const btn = e.target.closest('[data-day]');
  if (!btn) return;
  currentDay = parseInt(btn.dataset.day);
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentSec === 'treino') renderTreino(currentDay);
  else if (currentSec === 'dieta') renderDieta(currentDay);
});

document.querySelectorAll('.sec-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentSec = btn.dataset.sec;
    document.querySelectorAll('.sec-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['treino','dieta','subs'].forEach(s => {
      document.getElementById('content-' + s).classList.toggle('hidden', s !== currentSec);
    });
    if (currentSec === 'treino') renderTreino(currentDay);
    else if (currentSec === 'dieta') renderDieta(currentDay);
    else renderSubs();
  });
});

renderTreino(0);
</script>
</body>
</html>
